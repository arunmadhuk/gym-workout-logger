<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap (Latest v5.3) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Bootstrap Icons (Latest) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


   
    <!-- Page Title -->
    {% if title%}
    <title>{{title}}</title>
    {% else%}
    <title> DRM </title>
    {%endif%}
</head>

<body>

    {% include 'includes/header.html' %}

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>


    <div class="container-fluid">

        <div class="row">


            {% block content %}
            {% endblock content %}

        </div>



        <div id="ajax_loading" class="LoadingGif">
        </div>

        <!-- modal Dialog box -->
        <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
            aria-labelledby="modal-title" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <p class="modal-title" id="modal-title"></p>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <p class="modal-body" id="body-modal"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                            id="btn_close">Close</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container">
            <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="toast-header bg-secondary " id="toast_header">
                    <img src="{%static 'img/logo.jpg'%}" class="rounded me-2" style="height: 10%; width: 10%;"
                        alt="...">
                    <strong class="me-auto">Errors in Form</strong>
                    <small id="toast_time"></small>
                    <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
                <div class="toast-body" id="toast-body">

                </div>
            </div>
        </div>
    </div>
</body>

<script>



    $('#staticBackdrop').on('hidden.bs.modal', function (e) {
        location.reload();
        $("#ajax_loading").show()

    });


    setInterval(show_time, 1000);

    function show_time() {
        document.getElementById("date-time").innerHTML = formatAMPM();
    }


    function formatAMPM() {
        var d = new Date(),
            minutes = d.getMinutes().toString().length == 1 ? '0' + d.getMinutes() : d.getMinutes(),
            hours = d.getHours().toString().length == 1 ? '0' + d.getHours() : d.getHours(),
            ampm = d.getHours() >= 12 ? 'pm' : 'am',
            months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
            days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        if (hours > 12) {
            hours -= 12;
            ampm = "PM";
        }
        if (hours == 0) {
            hours = 12;
            ampm = "AM";
        }

        hours = hours < 10 ? "0" + hours : hours
        // console.log(hours, minutes, ampm)
        return days[d.getDay()] + ", " + months[d.getMonth()] + ' ' + d.getDate() + ' ' + d.getFullYear() + ' ' + hours + ':' + minutes + ' ' + ampm;
    }


</script>

</html>
